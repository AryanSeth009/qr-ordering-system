<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Cormorant+Garamond:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#990003",
                        "background-light": "#fdfaf3", /* Custom Cream shade for the design */
                        "background-dark": "#230f0f",
                        "cherry": {
                            "50": "#fff1f1",
                            "100": "#ffe1e1",
                            "200": "#ffc7c7",
                            "300": "#ffa0a0",
                            "400": "#ff6a6a",
                            "500": "#f83b3b",
                            "600": "#e51d1d",
                            "700": "#990003", /* Matches Primary */
                            "800": "#a00c0c",
                            "900": "#851111",
                        }
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "serif": ["Cormorant Garamond", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-primary/10 px-6 md:px-10 py-4 bg-background-light/80 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-3 text-primary">
<div class="size-8 flex items-center justify-center rounded-lg bg-primary/10">
<span class="material-symbols-outlined text-primary">shield_person</span>
</div>
<h2 class="text-primary text-xl font-serif font-bold leading-tight tracking-tight">Cherry &amp; Cream Admin</h2>
</div>
<div class="flex items-center gap-4">
<button class="hidden md:flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 border border-primary/20 hover:bg-primary/5 text-primary text-sm font-bold transition-colors">
<span class="truncate">Documentation</span>
</button>
<button class="flex size-10 items-center justify-center rounded-lg bg-primary text-white hover:bg-primary/90 transition-colors">
<span class="material-symbols-outlined text-sm">help</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-[460px] flex flex-col gap-8">
<!-- Branding Header -->
<div class="text-center space-y-2">
<h1 class="font-serif text-4xl md:text-5xl font-bold text-primary tracking-tight">Cherry &amp; Cream Admin</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-medium">Secure Portal Access</p>
</div>
<!-- Login Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-[0_20px_50px_rgba(153,0,3,0.08)] border border-primary/5 overflow-hidden">
<!-- Image Banner -->
<div class="h-32 w-full bg-cover bg-center" data-alt="Elegant macro shot of ripe cherries on cream background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDhINQeLDwKbHFrMazbGt912U_mM07nhM7alslUBLi8GBIMIpelMudyK2QP-fRyU5Eh6EV72g6YqUGy4QqKT2PVmGeecYksQSfnOM9LWQ_-K9SvKKii-qI-LgEZtSqTZRKW7z-7yZpNLH0xXfqsfr2TlXqhiiVqVpJ32qdGo2F0BArNRJAe4cr8-HCCdgaggbIysDP2Ab-0du69xKdZJoyFDZe_KqPj7kZoxkhNvckW2YBpNBIUyT_q6xb9vXzLu1M1fHkmbZ_yf-6n');">
<div class="w-full h-full bg-primary/20 backdrop-brightness-75"></div>
</div>
<div class="p-8 md:p-10 space-y-6">
<div class="space-y-1">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white">Admin Login</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Enter your administrative credentials</p>
</div>
<form class="space-y-5" onsubmit="return false;">
<!-- Username Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1" for="username">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full pl-12 pr-4 py-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-slate-400" id="username" placeholder="j.smith@cherrycream.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-12 pr-4 py-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-slate-400" id="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 px-1">
<input class="rounded border-slate-300 text-primary focus:ring-primary/30 size-4" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember">Remember this device for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span>Access Dashboard</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
</div>
</div>
<!-- Footer Info -->
<div class="text-center text-slate-400 dark:text-slate-600 text-xs font-medium uppercase tracking-widest">
                    Authorized Personnel Only • System ID: CC-772
                </div>
</div>
</main>
<!-- Page Footer -->
<footer class="py-6 px-10 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-400 text-sm">
<p>© 2024 Cherry &amp; Cream Group</p>
<div class="flex gap-6">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Security Audit</a>
</div>
</footer>
</div>
</body></html>
