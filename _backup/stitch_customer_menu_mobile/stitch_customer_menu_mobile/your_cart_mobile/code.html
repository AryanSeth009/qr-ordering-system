<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#990003",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col max-w-md mx-auto bg-white dark:bg-background-dark shadow-xl overflow-x-hidden">
<!-- Top Navigation -->
<div class="sticky top-0 z-10 flex items-center bg-white/80 dark:bg-background-dark/80 backdrop-blur-md p-4 justify-between border-b border-primary/10">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-primary/5 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">My Cart</h2>
<div class="size-10 flex items-center justify-center">
<!-- Spacer for symmetry -->
</div>
</div>
<div class="flex-1 overflow-y-auto px-4 py-6 space-y-6">
<div class="flex items-center justify-between">
<h3 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight">Order Details</h3>
<span class="text-primary text-sm font-semibold px-3 py-1 bg-primary/10 rounded-full">2 Items</span>
</div>
<!-- Item Card: Espresso -->
<div class="flex gap-4 p-3 bg-white dark:bg-slate-800/50 rounded-xl border border-primary/5 shadow-sm">
<div class="w-24 h-24 bg-center bg-no-repeat bg-cover rounded-lg shrink-0" data-alt="Close up of a double espresso with crema" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBxGuIxiOEr9D8C4euoK_bp52Jj2XmKpwRmUF2hpigYMkLECE2kdXFq2lwsNyEHnDnajzRdqgFOL4xB2NZ3P2PGdMqD-RO7zG6LbVULdB5xJ8Yb6bEgwx5PLHoQ2XkmimigTozmb9Jxn6J-4oMKGymA1ssYsSgHjJECpniVcFymVdekOzOz2Dvof1MPhI3ifzcX5F5R7srPKz-OTfY5e1X_lwjAeqRR96iliqjbX6Px3fT0uy6mdpLUVkvx_VrHvE-AVwnxLGLwrLQC");'>
</div>
<div class="flex flex-col justify-between flex-1">
<div class="flex justify-between items-start">
<div>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold leading-tight">Espresso</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Double Shot</p>
</div>
<button class="text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<div class="flex items-center justify-between mt-2">
<p class="text-primary text-base font-bold">$6.00</p>
<div class="flex items-center gap-3 bg-background-light dark:bg-background-dark p-1 rounded-lg border border-primary/10">
<button class="flex h-7 w-7 items-center justify-center rounded-md bg-white dark:bg-slate-700 shadow-sm text-primary hover:bg-primary hover:text-white transition-all">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="text-sm font-bold w-4 text-center">2</span>
<button class="flex h-7 w-7 items-center justify-center rounded-md bg-white dark:bg-slate-700 shadow-sm text-primary hover:bg-primary hover:text-white transition-all">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Item Card: Croissant -->
<div class="flex gap-4 p-3 bg-white dark:bg-slate-800/50 rounded-xl border border-primary/5 shadow-sm">
<div class="w-24 h-24 bg-center bg-no-repeat bg-cover rounded-lg shrink-0" data-alt="Flaky golden brown butter croissant on a plate" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAdFPYjzs2qQ7ycPqPJryb8jbc6HOxErAuPtGkJfqX4crPjsbxBU7P7E-HdqdyAhz7SP31-VQkYWWj2WhRIEuvOzvf12AbHEOeGnfSZvUl3p9LzTvToWXwmyQdGlXzMCGz8Zipkb0lcRk3JYWO1OanMqYfBmwOtPmR5XV3A6ZvbMaBbge8TghsxzYoYPYcM7b8i7fOCUTIF9M-1giN8-QWqTRBf5Rhjf3HTWHmqjFJ3SLJv3HgCtCI41pXKAK_HxnTszh7RHYtp7noq");'>
</div>
<div class="flex flex-col justify-between flex-1">
<div class="flex justify-between items-start">
<div>
<p class="text-slate-900 dark:text-slate-100 text-base font-bold leading-tight">Croissant</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Butter Flaky</p>
</div>
<button class="text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<div class="flex items-center justify-between mt-2">
<p class="text-primary text-base font-bold">$4.50</p>
<div class="flex items-center gap-3 bg-background-light dark:bg-background-dark p-1 rounded-lg border border-primary/10">
<button class="flex h-7 w-7 items-center justify-center rounded-md bg-white dark:bg-slate-700 shadow-sm text-primary hover:bg-primary hover:text-white transition-all">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="text-sm font-bold w-4 text-center">1</span>
<button class="flex h-7 w-7 items-center justify-center rounded-md bg-white dark:bg-slate-700 shadow-sm text-primary hover:bg-primary hover:text-white transition-all">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Notes Section -->
<div class="pt-4">
<p class="text-slate-900 dark:text-slate-100 text-sm font-bold mb-2">Special Instructions</p>
<textarea class="w-full bg-white dark:bg-slate-800/50 border border-primary/10 rounded-xl p-3 text-sm focus:ring-primary focus:border-primary" placeholder="Add a note (e.g. no sugar, extra hot)..." rows="2"></textarea>
</div>
</div>
<!-- Sticky Bottom Section -->
<div class="sticky bottom-0 bg-white dark:bg-background-dark border-t border-primary/10 p-4 pb-8 space-y-4">
<div class="space-y-2">
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500 dark:text-slate-400">Table Number</span>
<span class="font-bold text-slate-900 dark:text-slate-100 flex items-center gap-1">
<span class="material-symbols-outlined text-sm">table_restaurant</span>
                        Table 4
                    </span>
</div>
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500 dark:text-slate-400">Subtotal</span>
<span class="font-medium text-slate-900 dark:text-slate-100">$10.50</span>
</div>
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500 dark:text-slate-400">Tax</span>
<span class="font-medium text-slate-900 dark:text-slate-100">$0.85</span>
</div>
<div class="flex justify-between items-center pt-2 border-t border-primary/5">
<span class="text-base font-bold text-slate-900 dark:text-slate-100">Total Amount</span>
<span class="text-xl font-bold text-primary">$11.35</span>
</div>
</div>
<button class="w-full bg-primary text-background-light py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
<span>Place Order</span>
<span class="material-symbols-outlined">shopping_bag</span>
</button>
</div>
</div>
