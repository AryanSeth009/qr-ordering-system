<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Cormorant+Garamond:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#990003",
                        "background-light": "#f8f5f5",
                        "background-dark": "#230f0f",
                        "cream": "#EFE6DE",
                        "ink": "#1A1210",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "serif": ["Cormorant Garamond", "serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Checkout - Cherry &amp; Cream</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-cream text-ink font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-cream pb-32">
<header class="sticky top-0 z-10 bg-cream/90 backdrop-blur-md px-4 py-4 flex items-center justify-between border-b border-primary/10">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-primary/5 transition-colors">
<span class="material-symbols-outlined text-ink">arrow_back</span>
</button>
<h1 class="font-serif text-2xl font-bold tracking-tight text-ink">Checkout</h1>
<div class="size-10"></div>
</header>
<main class="flex-1 px-4 py-6 space-y-6">
<section class="bg-white/50 rounded-xl p-4 border border-primary/5">
<div class="flex items-center gap-4">
<div class="flex size-12 items-center justify-center rounded-lg bg-primary/10 text-primary">
<span class="material-symbols-outlined">table_restaurant</span>
</div>
<div>
<p class="text-xs uppercase tracking-wider font-semibold text-primary/60">Dining Detail</p>
<p class="text-lg font-bold text-ink">Table Number: Table 4</p>
</div>
</div>
</section>
<section class="space-y-3">
<h2 class="font-serif text-xl font-bold px-1">Order Summary</h2>
<div class="bg-white/80 rounded-xl border border-primary/5 overflow-hidden">
<details class="group" open="">
<summary class="flex cursor-pointer items-center justify-between p-4 list-none">
<span class="font-semibold text-ink">Items (2)</span>
<span class="material-symbols-outlined text-primary group-open:rotate-180 transition-transform">expand_more</span>
</summary>
<div class="px-4 pb-4 space-y-3">
<div class="flex justify-between items-center py-2 border-t border-primary/5">
<div class="flex items-center gap-3">
<div class="size-12 rounded-lg bg-cream flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Close up of a cherry danish pastry" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAW2prl0l3_CmpzkrM3cR9sg6zNnJeWCDUER1dhCHiAVGVhkuvpSv-bBahwpeuBz8d5T3QXch_Tx5264W37xi2-HDpeZIxKAtGbBTGIUxDKBKHy79NmJVsKcT_lO5WDgpOpoPSMDB4t7sqdgSz3DNTDPjhUFxTeVqWkcmE39Cp53DmpMtXLqUMHCW_mLNEczwPa_2FYnas1u24ob0H3_EUyrN8pTjb6fTGDMIIk9LY_k1aC0gPFX-qXllzYdgpgPYEzvYRq7Pjdon89"/>
</div>
<div>
<p class="font-medium text-ink">Cherry Danish</p>
<p class="text-xs text-primary/70">Pastry</p>
</div>
</div>
<p class="font-semibold text-ink">$5.50</p>
</div>
<div class="flex justify-between items-center py-2 border-t border-primary/5">
<div class="flex items-center gap-3">
<div class="size-12 rounded-lg bg-cream flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Hot flat white coffee in a cup" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCsihaUT1pNNM3Ds4s-9uZ7JWYDfZLWY36ntYRcmjKIqxYnZ-CGb54SLCuQZVMNywkaXwK3ebLlQ33L0ZeorhT2FyOOgJUDiK0jgqEXI2moCSGH57nIbNVs6WXH5mskgR_n8f27ixWo7Sfx9cJ9Ehn99WkxfoCPF-bsmR-KaNX00ZvGN2djGT9wxQKooFRth0r97ow8iq00azwqbvj_F_JXy1a99SMkhaYBk-n4WFwhAgDHQwMZaaXSbZm1cg0NSxC67m25QRvNXlFH"/>
</div>
<div>
<p class="font-medium text-ink">Flat White</p>
<p class="text-xs text-primary/70">Large • Oat Milk</p>
</div>
</div>
<p class="font-semibold text-ink">$5.85</p>
</div>
</div>
</details>
</div>
</section>
<section class="space-y-3">
<h2 class="font-serif text-xl font-bold px-1">Payment Method</h2>
<div class="space-y-3">
<label class="flex items-center gap-4 p-4 rounded-xl border-2 border-primary bg-white cursor-pointer">
<input checked="" class="text-primary focus:ring-primary size-5" name="payment" type="radio"/>
<div class="flex items-center gap-3 flex-1">
<span class="material-symbols-outlined text-primary">storefront</span>
<span class="font-medium">Pay at Counter</span>
</div>
</label>
<label class="flex items-center gap-4 p-4 rounded-xl border border-primary/10 bg-white/60 cursor-pointer hover:bg-white transition-colors">
<input class="text-primary focus:ring-primary size-5" name="payment" type="radio"/>
<div class="flex items-center gap-3 flex-1">
<span class="material-symbols-outlined text-primary">credit_card</span>
<span class="font-medium">Credit/Debit Card</span>
</div>
</label>
<label class="flex items-center gap-4 p-4 rounded-xl border border-primary/10 bg-white/60 cursor-pointer hover:bg-white transition-colors">
<input class="text-primary focus:ring-primary size-5" name="payment" type="radio"/>
<div class="flex items-center gap-3 flex-1">
<span class="material-symbols-outlined text-primary">contactless</span>
<span class="font-medium">Apple / Google Pay</span>
</div>
</label>
</div>
</section>
</main>
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-lg border-t border-primary/10 p-4 pb-8 space-y-4 shadow-2xl z-20">
<div class="flex items-center justify-between px-2">
<div>
<p class="text-sm font-medium text-primary/70">Total Amount</p>
<p class="text-2xl font-bold text-ink">$11.35</p>
</div>
<div class="text-right">
<p class="text-[10px] uppercase tracking-tighter text-ink/40">Includes $0.85 Tax</p>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-[0.98]">
                Confirm &amp; Place Order
            </button>
</footer>
</div>
</body></html>
