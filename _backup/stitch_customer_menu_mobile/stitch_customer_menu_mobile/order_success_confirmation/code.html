<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Cormorant+Garamond:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#990003", // Cherry
                        "background-light": "#EFE6DE", // Cream
                        "background-dark": "#230f0f",
                        "ink": "#1A1210",
                        "muted": "#8A7B72"
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "serif": ["Cormorant Garamond", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #EFE6DE;
        }
        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Container -->
<div class="w-full max-w-md bg-background-light dark:bg-background-dark flex flex-col items-center text-center">
<!-- Success Icon Section -->
<div class="mb-8 mt-12">
<div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary !text-6xl" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
                    check_circle
                </span>
</div>
</div>
<!-- Heading & Subtext -->
<h1 class="font-serif text-ink dark:text-slate-100 text-4xl font-bold mb-3">Order Confirmed!</h1>
<p class="text-muted dark:text-slate-400 text-base font-normal leading-relaxed px-6 mb-10">
            Your order has been sent to the kitchen and is being prepared.
        </p>
<!-- Order Info Card -->
<div class="w-full bg-white/50 dark:bg-primary/5 border border-primary/10 rounded-xl p-6 mb-10 shadow-sm backdrop-blur-sm">
<div class="flex justify-between items-center border-b border-primary/5 pb-4 mb-4">
<div class="text-left">
<p class="text-muted text-xs uppercase tracking-widest font-semibold mb-1">Order Number</p>
<p class="text-ink dark:text-slate-100 text-xl font-bold">#1234</p>
</div>
<div class="text-right">
<p class="text-muted text-xs uppercase tracking-widest font-semibold mb-1">Status</p>
<div class="flex items-center gap-1 justify-end">
<span class="size-2 bg-primary rounded-full"></span>
<p class="text-primary text-sm font-bold">In Progress</p>
</div>
</div>
</div>
<div class="flex items-center gap-3">
<div class="bg-primary/10 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary">schedule</span>
</div>
<div class="text-left">
<p class="text-muted text-xs font-medium">Estimated Prep Time</p>
<p class="text-ink dark:text-slate-100 font-bold">15-20 mins</p>
</div>
</div>
</div>
<!-- Image Decoration -->
<div class="w-full px-4 mb-10">
<div class="relative h-40 w-full overflow-hidden rounded-xl shadow-lg">
<img alt="Artisan coffee and pastry on a cafe table" class="w-full h-full object-cover" data-alt="Close up of steaming coffee and fresh croissant" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgvaFDJ-obR8bMgcW9kDTjbIm1OL3sPjZVrChq7D5BmutaaHlGWEKxJbbMBFJ0j5GWeu-dnx2y9Ino8h6BRuHA7NvqkErnh8bpcENuEsJJy-b_8WOOfdPYsk5DGQaFZpImNvLQoB9srrsjA9KBCK_yJ2F4DG4AGyWX_-BcMXyuWabjj4ZnrX-Yp8NZrex005nXHDe63R4-iV71RnAfsnkuRjq_28VhkMmpGgo6L9qNcav0kci2XFjU-lzt5oNLaSkn0BB7BSpXjo7H"/>
<div class="absolute inset-0 bg-gradient-to-t from-ink/40 to-transparent"></div>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full space-y-3 px-4 mb-12">
<button class="w-full bg-primary text-background-light py-4 rounded-xl font-bold shadow-md active:scale-[0.98] transition-transform">
                Track Your Order
            </button>
<button class="w-full bg-transparent border-2 border-ink text-ink dark:border-slate-100 dark:text-slate-100 py-4 rounded-xl font-bold active:scale-[0.98] transition-transform">
                Back to Menu
            </button>
</div>
</div>
<!-- Bottom Navigation Bar (Fixed) -->
<div class="fixed bottom-0 left-0 right-0 bg-white dark:bg-background-dark border-t border-primary/10 px-4 pb-4 pt-3 flex justify-around items-center">
<a class="flex flex-col items-center gap-1 text-muted" href="#">
<span class="material-symbols-outlined">coffee</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Menu</p>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Orders</p>
</a>
<a class="flex flex-col items-center gap-1 text-muted" href="#">
<span class="material-symbols-outlined">favorite</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Favorites</p>
</a>
<a class="flex flex-col items-center gap-1 text-muted" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Profile</p>
</a>
</div>
</body></html>
